<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpoFinance — Sign Up</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="auth-page">

  <!-- Language switcher -->
  <div class="lang-switcher" role="group" aria-label="Language selector">
    <button class="lang-btn active" data-lang="en" aria-pressed="true">EN</button>
    <button class="lang-btn"        data-lang="fa" aria-pressed="false">FA</button>
  </div>

  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <span class="material-icons-round">show_chart</span>
      </div>
      <div>
        <div class="auth-logo-text">OpoFinance</div>
        <div class="auth-logo-sub" data-i18n="brand.sub">Risk Management Portal</div>
      </div>
    </div>

    <h1 class="auth-title" data-i18n="signup.title">Create account</h1>
    <p class="auth-subtitle" data-i18n="signup.subtitle">Set up your risk management workspace</p>

    <form id="signupForm" novalidate>
      <div class="form-field">
        <label for="fullName" data-i18n="signup.label.fullname">Full Name</label>
        <input type="text" id="fullName"
               data-i18n-placeholder="ph.fullname"
               placeholder="Elahe Ahmadi"
               autocomplete="name">
      </div>

      <div class="form-field">
        <label for="email" data-i18n="signup.label.email">Email Address</label>
        <input type="email" id="email"
               data-i18n-placeholder="ph.email"
               placeholder="elahe@opofinance.com"
               autocomplete="email">
      </div>

      <div class="form-field">
        <label for="password" data-i18n="signup.label.password">Password</label>
        <input type="password" id="password"
               data-i18n-placeholder="ph.new.password"
               placeholder="Choose a strong password"
               autocomplete="new-password">
      </div>

      <div class="form-field">
        <label for="confirmPass" data-i18n="signup.label.confirm">Confirm Password</label>
        <input type="password" id="confirmPass"
               data-i18n-placeholder="ph.confirm.password"
               placeholder="Repeat your password"
               autocomplete="new-password">
      </div>

      <div class="auth-error" id="signupError">
        <span data-i18n="signup.error">Passwords do not match. Please try again.</span>
      </div>

      <button type="submit" class="btn btn-primary" style="margin-top:8px">
        <span class="material-icons-round" style="font-size:18px">person_add</span>
        <span data-i18n="signup.submit">Create Account</span>
      </button>
    </form>

    <div class="auth-footer">
      <span data-i18n="signup.footer.text">Already have an account?</span>
      <a href="index.html" data-i18n="signup.footer.link">Sign in</a>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/signup.js"></script>
</body>
</html>
